  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper" id="co_wrap">
    <!-- Content Header (Page header) -->
    <div class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1 class="m-0">Roles & Permissions</h1>
          </div><!-- /.col -->
        </div><!-- /.row -->
      </div><!-- /.container-fluid -->
    </div>
    <!-- /.content-header -->

    <!-- Main content -->
    <div class="content">
      <div class="container-fluid">
        <div class="row">
          <div class="col">
						<div class="card card-primary">
							<div class="card-body">
                <div class="col-3 row">
									<button type="button" class="btn btn-success btn-block" onclick="tambah_role_modal()"><i class="fa fa-plus"></i> Add Role</button>
								</div>
								<br>
                <table id="roles_table" style="table-layout: fixed;" class="table table-bordered table-striped table-hover display">
                  <thead>
                    <th>Role Name</th>
                    <th>Created At</th>
                    <th>Modified At</th>
                    <th>Action</th>
                  </thead>
                  <tbody>
                  </tbody>
								</table>
							</div>
						</div>
					</div>
        </div>
        <div class="modal fade" id="modal_role" style="display: none;" aria-hidden="true">
					<div class="modal-dialog modal-xl modal-dialog-centered">
						<div class="modal-content">
							<div class="modal-header">
								<h4 class="modal-title" id="modal_role_title">Add Role</h4>
								<button type="button" class="close" data-dismiss="modal" aria-label="Close">
									<span aria-hidden="true">×</span>
								</button>
							</div>
							<div class="modal-body">
								<div class="form-group">
									<label for="username">Role Name</label>
									<div class="input-group">
										<div class="input-group-prepend">
											<span class="input-group-text"><i class="fas fa-user-tag"></i></span>
										</div>
										<input type="text" class="form-control" id="role_name" placeholder="Role Name" autocomplete="off">
									</div>
								</div>
                <div class="form-group">
									<label class="hr-text">Permissions</label>
									<div class="row">
                    <div class="col-md-4">
                      <label class="mb-2">Kasir Permission</label>
                      <div class="icheck-primary"><input class="perm_cb" type="checkbox" id="manage_barang" value="1"><label class="form-check-label" for="manage_barang">Manage Barang</label></div>
                      <div class="icheck-primary"><input class="perm_cb" type="checkbox" id="kasir" value="2"><label class="form-check-label" for="kasir">Kasir</label></div>
                      <div class="icheck-primary"><input class="perm_cb" type="checkbox" id="manage_pembukuan" value="3"><label class="form-check-label" for="manage_pembukuan">Manage Pembukuan</label></div>
                      <div class="icheck-primary"><input class="perm_cb" type="checkbox" id="dashboard" value="4"><label class="form-check-label" for="dashboard">Dashboard</label></div>
                    </div>
                  </div>
							  </div>
                <div class="form-group" id="user_assigned_role" style="display: none;">
									<label class="hr-text">Users assigned to this role</label>
                  <table id="user_assigned_role_table" style="table-layout: fixed;" class="table table-bordered table-striped table-hover display">
                    <thead>
                      <th>Full Name (Username)</th>
                    </thead>
                    <tbody>
                    </tbody>
                  </table>
							  </div>
							</div>
							<div class="modal-footer justify-content-between">
								<button type="button" class="btn btn-default" data-dismiss="modal">Close (Esc)</button>
								<button type="button" class="btn btn-success" id="modal_role_button">Add Role</button>
							</div>
						</div>
					</div>
				</div>
        <!-- /.row -->
      </div><!-- /.container-fluid -->
    </div>
