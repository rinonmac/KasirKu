<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KasirKu | Login</title>

  <!-- Google Font: Source Sans Pro -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
  <!-- icheck bootstrap -->
  <link rel="stylesheet" href="/plugins/icheck-bootstrap/icheck-bootstrap.min.css">
  <!-- Sweetalert2 -->
  <link rel="stylesheet" href="/plugins/sweetalert2/sweetalert2.css">
  <!-- Theme style -->
  <link rel="stylesheet" href="/dist/css/adminlte.min.css">
  <!-- AdminLTE Docs CSS -->
  <link rel="stylesheet" href="/plugins/adminlte-docs/adminlte-docs.css">
  <style>
    .theme-switch-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0.5rem 0;
    }
  </style>
  <script>
    (async function () {
      const username = localStorage.getItem("username");
      const password = localStorage.getItem("password");
      if (username && password) {
        let res = await fetch("/login", {
          method: "POST",
          body: new URLSearchParams({
            username, password
          })
        })
        if (res.status === 200) {
          localStorage.setItem("token", await res.text());
          window.location.href = "/"
        }
      }
    })()
  </script>
</head>

<body class="hold-transition login-page dark-mode">
  <div class="login-box">
    <!-- /.login-logo -->
    <div class="card card-outline card-primary">
      <div class="card-header text-center">
        <a class="h1"><b>Kasir</b>Ku</a>
      </div>
      <div class="card-body">
        <div class="input-group mb-3">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-user"></span>
            </div>
          </div>
          <input type="text" id="username" class="form-control" placeholder="Username"
            onkeypress="if(event.key === 'Enter'){ document.getElementById('password').focus() }" autocomplete="off">
        </div>
        <div class="input-group mb-3">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
          <input type="password" id="password" class="form-control" placeholder="Password"
            onkeypress="if(event.key === 'Enter'){ login() }" autocomplete="off">
          <div class="input-group-append">
            <button class="btn btn-outline-secondary toggle-password" type="button" data-target="password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="text-right">
          <div class="icheck-primary"><input type="checkbox" id="remember_me"><label class="form-check-label"
              for="remember_me"><b>Remember me</b></label></div>
        </div>
        <hr>
        <div class="theme-switch-wrapper">
          <label class="theme-switch">
            <input type="checkbox" id="dark_mode_checkbox">
            <span class="slider round"></span>
          </label>
          <label>Dark Mode</label>
        </div>
        <button type="submit" class="btn btn-primary btn-block" onclick="login()">Sign In</button>
      </div>
      <!-- /.card-body -->
    </div>
    <!-- /.card -->
  </div>
  <!-- /.login-box -->

  <!-- Dark Mode Script -->
  <script src="/app/darkmode_login.js"></script>

  <!-- jQuery -->
  <script src="/plugins/jquery/jquery.min.js"></script>
  <!-- Bootstrap 4 -->
  <script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
  <!-- AdminLTE App -->
  <script src="/dist/js/adminlte.min.js"></script>
  <!-- Sweetalert2 -->
  <script src="/plugins/sweetalert2/sweetalert2.all.min.js"></script>

  <!-- Login Script -->
  <script src="/app/login.js"></script>
  <script>
    document.querySelectorAll(".toggle-password").forEach(btn => {
      btn.addEventListener("click", function () {
        const input = document.getElementById(this.dataset.target);
        const icon = this.querySelector("i");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      });
    });
  </script>
  <script>document.getElementById("username").focus();</script>
</body>

</html>
